name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[test]

      - name: Run cross-platform test suite
        shell: pwsh
        run: |
          python -m pytest -q -m "not smoke" *> pytest-output.log
          $exitCode = $LASTEXITCODE
          Get-Content pytest-output.log
          if ($exitCode -ne 0) {
            $lines = Get-Content pytest-output.log
            $tail = ($lines | Select-Object -Last 80) -join "`n"
            $message = $tail -replace "%", "%25" -replace "`r", "%0D" -replace "`n", "%0A"
            Write-Output "::error title=pytest failed::$message"
            exit $exitCode
          }

  benchmark-baseline:
    name: Benchmark Baseline (ubuntu, py3.13)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[test]

      - name: Record synthetic benchmarks
        continue-on-error: true
        run: python -m benchmarks.run_benchmarks --output benchmarks/baseline.json

      - name: Upload benchmark baseline
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-baseline
          path: benchmarks/baseline.json
          if-no-files-found: ignore
