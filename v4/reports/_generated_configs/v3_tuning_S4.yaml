models:
  CALIBRATE: true
  CLIP_MULT: 2.0
  ENABLE_FAIL_TUNING: true
  ENABLE_HYPER_TL: true
  ENABLE_LOCAL_TRANSFORM_CANDIDATES: false
  ENABLE_MDL_SUBSET_CANDIDATES: false
  ENABLE_MLP: false
  ENABLE_TRANSFER_TRANSFORM_CANDIDATES: false
  FUSION_RANK: mae_then_r2
  FUSION_TOP_K: 8
  HYPER_TL:
    balance_pretrain_by_dataset: true
    batch_size: 256
    cp_hidden: 256
    dropout: 0.1
    embed_dim: 256
    ensemble_lambdas: true
    epochs: 120
    grad_clip: 5.0
    lr: 0.001
    mol_hidden: 512
    n_models: 5
    patience: 20
    ridge_lambda_b: 0.01
    ridge_lambdas:
    - 0.0
    - 0.001
    - 0.01
    - 0.1
    - 1.0
    - 10.0
    unified_finetune_epochs: 40
    unified_finetune_lr: 0.001
    unified_ridge_lambda_b: 0.0
    unified_ridge_lambdas:
    - 0.0
    - 1.0e-06
    - 0.001
    - 0.1
    use_mdl_subset_mol: true
    use_task_weight: true
    val_frac: 0.1
    weight_decay: 0.0001
  HYPER_TL_GUARANTEED_SLOT: true
  LGBM_A:
    bagging_fraction: 0.9
    bagging_freq: 1
    feature_fraction: 0.8
    learning_rate: 0.02
    n_estimators: 4000
    num_leaves: 63
    objective: mae
  LGBM_B:
    bagging_fraction: 0.85
    bagging_freq: 1
    feature_fraction: 0.85
    learning_rate: 0.03
    n_estimators: 2500
    num_leaves: 127
    objective: huber
  LOCAL_TARGET_TRANSFORMS:
  - log1p
  - gradient_norm
  ONLY_HYPER_TL: true
  SINGLE_TASK_AUTO_POLICY:
    duplicate_mol_key_rate_min: 0.12
    enabled: true
    high_outlier_rate: 0.1
    medium: {}
    medium_duplicate_rich:
      ENABLE_ANCHOR_TL: true
    medium_n_max: 400
    near_dead_time_ratio_max: 2.0
    small:
      ENABLE_MLP: false
      FUSION_TOP_K: 8
    small_duplicate_mol_key_rate_min: 0.2
    small_duplicate_rich:
      ENABLE_ANCHOR_TL: true
      ENABLE_HYPER_TL: true
      FUSION_TOP_K: 8
    small_n_max: 140
    small_outlier:
      FUSION_TOP_K: 6
    tiny_n_max: 80
    tiny_near_dead_time:
      ENABLE_ANCHOR_TL: true
      ENABLE_HYPER_TL: false
      ENABLE_LOCAL_TRANSFORM_CANDIDATES: false
      ENABLE_MLP: false
      FUSION_TOP_K: 5
  UNIFIED_MULTITASK: true
  XGB_A:
    colsample_bytree: 0.8
    learning_rate: 0.02
    max_depth: 6
    n_estimators: 3000
    objective: reg:absoluteerror
    reg_lambda: 2.0
    subsample: 0.9
  XGB_B:
    colsample_bytree: 0.85
    learning_rate: 0.03
    max_depth: 8
    n_estimators: 2000
    objective: reg:squarederror
    reg_lambda: 2.0
    subsample: 0.85
