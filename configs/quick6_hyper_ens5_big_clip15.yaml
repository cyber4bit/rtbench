    - 0.1
    - 1.0
    - 10.0
    - 100.0
    - 1000.0
    ridge_lambda_b: 0.01
transfer_weights:
  adaptive_source: false
  target_transform: none
seeds:
  default: 0:4
outputs:
  root: outputs_quick6_hyper_ens5_big_clip15_v1
