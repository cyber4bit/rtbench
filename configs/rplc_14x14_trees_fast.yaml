_base:
- _bases/_base_rplc_14x14.yaml
- _bases/_base_transfer.yaml
- _bases/_base_models_tree.yaml
datasets:
  external:
  - 0028
  - '0032'
  - 0039
  - 0049
  - '0050'
  - '0051'
  - '0056'
  - '0057'
  - '0060'
  - '0233'
  - '0255'
  - '0274'
  - '0275'
  - '0276'
models:
  ENABLE_FAIL_TUNING: false
  EARLY_STOPPING_ROUNDS: 50
  FUSION_TOP_K: 2
  FUSION_RANK: mae_then_r2
  CALIBRATE: true
  ENABLE_MLP: false
  CLIP_MULT: 2.5
  XGB_A:
    n_estimators: 1200
    learning_rate: 0.03
    tree_method: hist
  XGB_B:
    n_estimators: 1200
    learning_rate: 0.04
    tree_method: hist
  LGBM_A:
    n_estimators: 2000
    learning_rate: 0.03
  LGBM_B:
    n_estimators: 2000
    learning_rate: 0.04
transfer_weights:
  source: 0.1
  similarity_power: 2.0
  min_scale: 0.25
  max_scale: 2.0
  target_transform: none
seeds:
  default: 0:4
outputs:
  root: outputs_rplc_14x14_trees_fast_v1
  resume: false
