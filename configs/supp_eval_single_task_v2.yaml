_base:
- _bases/_base_rplc_14x14.yaml
- _bases/_base_transfer.yaml
- _bases/_base_models_tree.yaml
- _bases/_base_cpvec.yaml
datasets:
  external:
  - 0028
split:
  strategy: stratified
models:
  ONLY_HYPER_TL: false
  ENABLE_HYPER_TL: true
  ENABLE_FAIL_TUNING: true
  FUSION_TOP_K: 5
  FUSION_RANK: mae_then_r2
  CALIBRATE: false
  ENABLE_MLP: false
  ENABLE_MDL_SUBSET_CANDIDATES: true
  ENABLE_LOCAL_TRANSFORM_CANDIDATES: true
  LOCAL_TARGET_TRANSFORMS:
  - log1p
  - gradient_norm
  ENABLE_ANCHOR_TL: true
  CLIP_MULT: 2.5
  ANCHOR_TL:
    similarity_power: 2.0
    min_scale: 0.15
    max_scale: 2.5
    top_k_sources: 8
    min_train_points: 6
  XGB_A:
    n_estimators: 2600
  XGB_B:
    n_estimators: 1800
  LGBM_A:
    n_estimators: 3600
  LGBM_B:
    n_estimators: 2200
  LOCAL_XGB:
    n_estimators: 1600
    max_depth: 6
    learning_rate: 0.03
    subsample: 0.9
    colsample_bytree: 0.8
    objective: reg:absoluteerror
    reg_lambda: 2.0
  LOCAL_LGBM:
    n_estimators: 2200
    num_leaves: 63
    learning_rate: 0.03
    objective: mae
    feature_fraction: 0.9
    bagging_fraction: 0.9
    bagging_freq: 1
  EARLY_STOPPING_ROUNDS: 60
  HYPER_TL:
    balance_pretrain_by_dataset: true
    n_models: 3
    embed_dim: 256
    mol_hidden: 1024
    cp_hidden: 256
    dropout: 0.05
    epochs: 140
    batch_size: 256
    lr: 0.001
    weight_decay: 0.0001
    val_frac: 0.1
    patience: 14
    ridge_lambdas:
    - 0.0
    - 1e-5
    - 1e-4
    - 0.001
    - 0.01
    - 0.1
    - 1.0
    - 10.0
    - 100.0
    - 1000.0
    ridge_lambda_b: 0.01
transfer_weights:
  source: 0.05
  similarity_power: 2.0
  min_scale: 0.15
  max_scale: 2.0
  source_weight_mode: per_sample
  top_k_sources: 6
  overlap_adaptive_source: true
  overlap_ref: 0.45
  overlap_power: 1.0
  overlap_min_scale: 0.05
  overlap_max_scale: 2.0
  overlap_disable_threshold: 0.08
  target_transform: none
seeds:
  default: 0:4
outputs:
  root: outputs_supp_eval_single_task_v2
  resume: false
