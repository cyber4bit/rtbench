_base:
- _bases/_base_rplc_14x14.yaml
- _bases/_base_transfer.yaml
datasets:
  external:
  - 0028
  - '0032'
  - 0039
  - 0049
  - '0050'
  - '0051'
  - '0056'
  - '0057'
  - '0060'
  - '0233'
  - '0255'
  - '0274'
  - '0275'
  - '0276'
models:
  ONLY_HYPER_TL: true
  ENABLE_HYPER_TL: true
  ENABLE_FAIL_TUNING: false
  FUSION_TOP_K: 1
  CALIBRATE: false
  ENABLE_MLP: false
  CLIP_MULT: 1.5
  HYPER_TL:
    balance_pretrain_by_dataset: true
    n_models: 5
    embed_dim: 512
    mol_hidden: 2048
    cp_hidden: 1024
    dropout: 0.1
    epochs: 220
    batch_size: 256
    lr: 0.0007
    weight_decay: 0.0001
    val_frac: 0.1
    patience: 18
    ridge_lambdas:
    - 0.0
    - 1e-5
    - 1e-4
    - 0.001
    - 0.01
    - 0.1
    - 1.0
    - 10.0
    - 100.0
    - 1000.0
    ridge_lambda_b: 0.01
transfer_weights:
  adaptive_source: false
  target_transform: none
seeds:
  default: 0:29
outputs:
  root: outputs_rplc_14x14_hyper_big_v1
  resume: false
