_base:
- _bases/_base_rplc_14x14.yaml
- _bases/_base_transfer.yaml
- _bases/_base_models_tree.yaml
- _bases/_base_cpvec.yaml
datasets:
  external:
  - 0028
  - '0032'
  - 0039
  - 0049
  - '0050'
  - '0051'
  - '0056'
  - '0057'
  - '0060'
  - '0233'
  - '0255'
  - '0274'
  - '0275'
  - '0276'
  failed_override:
  - 0039
  - '0051'
  - '0233'
  - '0050'
  - '0275'
  - '0276'
  - '0274'
split:
  strategy: random
models:
  ONLY_HYPER_TL: false
  ENABLE_HYPER_TL: true
  ENABLE_FAIL_TUNING: true
  FUSION_TOP_K: 1
  FUSION_RANK: mae_then_r2
  CALIBRATE: false
  ENABLE_MLP: false
  ENABLE_MDL_SUBSET_CANDIDATES: true
  ENABLE_LOCAL_TRANSFORM_CANDIDATES: true
  LOCAL_TARGET_TRANSFORMS:
  - log1p
  - gradient_norm
  ENABLE_ANCHOR_TL: false
  CLIP_MULT: 2.0
  HYPER_TL:
    balance_pretrain_by_dataset: true
    n_models: 5
    embed_dim: 256
    mol_hidden: 1024
    cp_hidden: 256
    dropout: 0.05
    epochs: 140
    batch_size: 256
    lr: 0.001
    weight_decay: 0.0001
    val_frac: 0.1
    patience: 14
    ridge_lambdas:
    - 0.0
    - 1e-5
    - 1e-4
    - 0.001
    - 0.01
    - 0.1
    - 1.0
    - 10.0
    - 100.0
    - 1000.0
    ridge_lambda_b: 0.01
  LOCAL_XGB:
    n_estimators: 1800
    max_depth: 6
    learning_rate: 0.03
    subsample: 0.9
    colsample_bytree: 0.8
    objective: reg:absoluteerror
    reg_lambda: 2.0
  LOCAL_LGBM:
    n_estimators: 2500
    num_leaves: 63
    learning_rate: 0.03
    objective: mae
    feature_fraction: 0.9
    bagging_fraction: 0.9
    bagging_freq: 1
  EARLY_STOPPING_ROUNDS: 60
transfer_weights:
  adaptive_source: false
  target_transform: none
seeds:
  default: 0:29
outputs:
  root: outputs_rplc_14x14_cpvec_random_hybrid_v1
  resume: false
