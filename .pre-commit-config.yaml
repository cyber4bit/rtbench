exclude: |
  (?x)^(
    \.venv.*/|
    external/MDL-TL/|
    data/repoRT/|
    outputs.*/|
    experiments/configs/|
    benchmarks/baseline\.json$
  )

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: trailing-whitespace
      - id: end-of-file-fixer

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args:
          - --exclude-files
          - ^(THIRD_PARTY_NOTICES\.md|LICENSE)$
